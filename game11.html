<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordle Clone - GameHub</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .wordle-board {
        display: grid;
        grid-template-rows: repeat(6, 1fr);
        gap: 5px;
        margin: 2rem auto;
        width: 350px;
        max-width: 100%;
      }
      .wordle-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
      }
      .wordle-tile {
        border: 2px solid #667eea;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: bold;
        color: #333; /* Dark text for unrevealed tiles */
        text-transform: uppercase;
        aspect-ratio: 1;
        border-radius: 8px;
        transition: all 0.3s;
      }
      .wordle-tile.correct { background-color: #2ecc71; border-color: #2ecc71; color: #fff; }
      .wordle-tile.present { background-color: #f1c40f; border-color: #f1c40f; color: #fff; }
      .wordle-tile.absent { background-color: #34495e; border-color: #34495e; color: #fff; }
      .wordle-tile.active { border-color: #a29bfe; }
      
      .wordle-keyboard {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 2rem;
        user-select: none;
      }
      .wordle-keyboard-row {
        display: flex;
        justify-content: center;
        gap: 6px;
      }
      .wordle-key {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        border-radius: 6px;
        padding: 15px 12px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        flex: 1;
        max-width: 45px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
      }
      .wordle-key:active { transform: scale(0.95); }
      .wordle-key.wide { max-width: 65px; font-size: 0.8rem; }
      .wordle-key.correct { background-color: #2ecc71; border-color: #2ecc71; }
      .wordle-key.present { background-color: #f1c40f; border-color: #f1c40f; }
      .wordle-key.absent { background-color: #34495e; border-color: #34495e; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <h1>🔤 Wordle</h1>
        <p style="color: white; font-size: 1rem; margin: 0;">Guess the hidden 5-letter word!</p>
      </div>

      <div class="page-content">
        <div class="container">
          <div class="stats-container">
            <div class="stat-box">
              <div class="stat-label">Current Streak</div>
              <div class="stat-value" id="wordle-streak">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Best Streak</div>
              <div class="stat-value" id="wordle-best">0</div>
            </div>
          </div>

          <div class="game-status" style="text-align: center; height: 30px; font-weight: bold; font-size: 1.2rem; margin-top: 1rem;"></div>

          <div class="wordle-board" id="wordle-board"></div>

          <div class="wordle-keyboard" id="wordle-keyboard">
            <div class="wordle-keyboard-row">
              <button class="wordle-key" data-key="q">Q</button>
              <button class="wordle-key" data-key="w">W</button>
              <button class="wordle-key" data-key="e">E</button>
              <button class="wordle-key" data-key="r">R</button>
              <button class="wordle-key" data-key="t">T</button>
              <button class="wordle-key" data-key="y">Y</button>
              <button class="wordle-key" data-key="u">U</button>
              <button class="wordle-key" data-key="i">I</button>
              <button class="wordle-key" data-key="o">O</button>
              <button class="wordle-key" data-key="p">P</button>
            </div>
            <div class="wordle-keyboard-row">
              <button class="wordle-key" data-key="a">A</button>
              <button class="wordle-key" data-key="s">S</button>
              <button class="wordle-key" data-key="d">D</button>
              <button class="wordle-key" data-key="f">F</button>
              <button class="wordle-key" data-key="g">G</button>
              <button class="wordle-key" data-key="h">H</button>
              <button class="wordle-key" data-key="j">J</button>
              <button class="wordle-key" data-key="k">K</button>
              <button class="wordle-key" data-key="l">L</button>
            </div>
            <div class="wordle-keyboard-row">
              <button class="wordle-key wide" data-key="Enter">ENTER</button>
              <button class="wordle-key" data-key="z">Z</button>
              <button class="wordle-key" data-key="x">X</button>
              <button class="wordle-key" data-key="c">C</button>
              <button class="wordle-key" data-key="v">V</button>
              <button class="wordle-key" data-key="b">B</button>
              <button class="wordle-key" data-key="n">N</button>
              <button class="wordle-key" data-key="m">M</button>
              <button class="wordle-key wide" data-key="Backspace">⌫</button>
            </div>
          </div>

          <div style="text-align: center; margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <button class="btn btn-primary" data-action="restart" style="display: none;">
              🔄 Play Again
            </button>
            <button class="btn btn-outline" data-action="home">
              🏠 Back to Home
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="audio.js"></script>
    <script src="storage.js"></script>
    <script src="wordle.js"></script>
  </body>
</html>
