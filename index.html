<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApexPlay - Play Amazing Games</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <!-- Page Header -->
      <div class="page-header">
        <h1 class="neon-title">🎮 ApexPlay</h1>
        <p style="color: var(--text-light); font-size: 1.1rem; margin: 0; margin-bottom: 1.5rem;">
          Discover amazing games, challenge yourself, and compete with others!
        </p>
        <div>
          <a href="dashboard.html" class="btn btn-primary" style="margin-right: 10px;">📊 Dashboard</a>
          <button class="btn btn-primary" onclick="document.querySelector('.game-grid').scrollIntoView({behavior: 'smooth'})">🎮 Play Now</button>
        </div>
      </div>

      <!-- Page Content -->
      <div class="page-content">
        <div class="container">
          <!-- Last Game Info -->
          <div class="last-game-info" style="margin-bottom: 2rem;"></div>

          <!-- Game Selection Grid -->
          <div class="game-grid"></div>

          <!-- Call to Action -->
          <div style="text-align: center; margin-top: 4rem;">
            <p style="color: var(--text-light); font-size: 0.95rem;">
              Each game is tracked automatically. Visit the Dashboard to see your scores and
              statistics!
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="storage.js"></script>
    <script src="main.js"></script>
  </body>
</html>
